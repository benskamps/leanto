<html lang="en">
<head>

<title>leanto — popsicle-stick sandbox</title>
<meta name="description" content="A tiny popsicle-stick physics toy. Grab sticks, prop them up, glue them, snip them — then drop your build into live physics and watch it stand, or fall. There's a cottage waiting inside." />

<style>
  :root {
    --ink:#382a1d; --muted:#6f5d4b; --paper:#f4ecdf; --paper-solid:#f7f0e5;
    --amber:#b9782f; --amber-soft:#e8c58c; --rust:#8b3d29; --line:rgba(56,42,29,.18);
    --shadow:0 10px 34px rgba(38,23,10,.16);
  }
  * { box-sizing:border-box; }
  [hidden] { display:none !important; }
  html, body { margin:0; width:100%; height:100%; overflow:hidden; background:var(--paper);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--ink); }
  button { color:inherit; font:inherit; }
  button:focus-visible { outline:3px solid rgba(185,120,47,.42); outline-offset:3px; }
  canvas { display:block; touch-action:none; }
  #workbench { position:fixed; inset:0; z-index:8; pointer-events:none; }
  .brand { position:absolute; left:18px; top:15px; pointer-events:none; }
  .brand h1 { margin:0; font:700 22px/1 ui-serif,Georgia,"Times New Roman",serif; letter-spacing:.01em; }
  .brand p { margin:5px 0 0; font:italic 12px/1.2 ui-serif,Georgia,serif; color:var(--muted); }
  #status { margin-top:8px; max-width:220px; font:10px/1.3 ui-monospace,"Cascadia Code",monospace;
    color:var(--muted); }
  #mode-toggle { position:absolute; left:50%; top:14px; transform:translateX(-50%);
    display:flex; align-items:center; gap:9px; pointer-events:auto; cursor:pointer;
    border:1px solid var(--line); border-radius:999px; padding:6px 7px 6px 13px;
    background:rgba(247,240,229,.93); box-shadow:0 5px 20px rgba(38,23,10,.10);
    backdrop-filter:blur(10px); transition:background .22s,border-color .22s,transform .18s; }
  #mode-toggle:hover { transform:translateX(-50%) translateY(-1px); }
  #mode-label { font:700 11px/1 ui-monospace,"Cascadia Code",monospace; letter-spacing:.1em; }
  .mode-next { border-radius:999px; padding:6px 10px; background:var(--ink); color:var(--paper-solid);
    font:600 11px/1 ui-sans-serif,system-ui,sans-serif; transition:background .22s; }
  [data-world="run"] #mode-toggle { border-color:rgba(139,61,41,.35); background:rgba(246,229,219,.95); }
  [data-world="run"] .mode-next { background:var(--rust); }
  .top-actions { position:absolute; right:16px; top:14px; display:flex; gap:7px; pointer-events:auto; }
  .icon-button { width:36px; height:36px; display:grid; place-items:center; border:1px solid var(--line);
    border-radius:50%; cursor:pointer; background:rgba(247,240,229,.9); box-shadow:0 4px 15px rgba(38,23,10,.08);
    transition:transform .16s,background .16s; }
  .icon-button:hover { transform:translateY(-1px); background:var(--paper-solid); }
  .icon-button:disabled { opacity:.35; cursor:not-allowed; transform:none; }
  #context-hint { position:absolute; left:50%; top:62px; transform:translateX(-50%); margin:0;
    max-width:min(520px,calc(100vw - 32px)); padding:7px 12px; border-radius:8px;
    background:rgba(247,240,229,.88); color:var(--muted); pointer-events:none;
    font:italic 13px/1.25 ui-serif,Georgia,serif; box-shadow:0 4px 18px rgba(38,23,10,.08);
    backdrop-filter:blur(8px); transition:opacity .18s,transform .18s; text-align:center; }
  .tool-rail { position:absolute; left:50%; bottom:16px; transform:translateX(-50%);
    display:flex; align-items:stretch; gap:3px; padding:5px; pointer-events:auto;
    border:1px solid var(--line); border-radius:16px; background:rgba(247,240,229,.94);
    box-shadow:var(--shadow); backdrop-filter:blur(12px); }
  .tool { min-width:62px; height:52px; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:3px; border:0; border-radius:11px; background:transparent;
    cursor:pointer; color:var(--muted); transition:background .16s,color .16s,transform .16s; }
  .tool:hover { color:var(--ink); background:rgba(56,42,29,.06); transform:translateY(-1px); }
  .tool.active { color:var(--ink); background:rgba(185,120,47,.16); }
  .tool:disabled { opacity:.32; cursor:not-allowed; transform:none; }
  .tool .glyph { font:700 18px/1 ui-serif,Georgia,serif; }
  .tool .label { font:600 10px/1 ui-sans-serif,system-ui,sans-serif; }
  #help-panel { position:fixed; inset:0; z-index:30; pointer-events:auto;
    background:rgba(36,23,12,.24); backdrop-filter:blur(4px); }
  .help-sheet { position:absolute; right:0; top:0; bottom:0; width:min(410px,100%);
    overflow:auto; padding:26px 28px 34px; background:var(--paper-solid); box-shadow:-16px 0 45px rgba(38,23,10,.2); }
  .help-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
  .help-head h2 { margin:0; font:700 24px/1 ui-serif,Georgia,serif; }
  .help-sheet > p { margin:8px 0 20px; color:var(--muted); font:italic 13px/1.45 ui-serif,Georgia,serif; }
  #help-list { list-style:none; margin:0; padding:0; border-top:1px solid var(--line); }
  #help-list li { display:flex; align-items:center; justify-content:space-between; gap:18px;
    padding:11px 0; border-bottom:1px solid var(--line); font-size:12px; }
  #help-list span { font-weight:650; }
  kbd { color:var(--muted); font:10px/1.2 ui-monospace,"Cascadia Code",monospace; text-align:right; }
  .showcase { width:100%; margin-top:22px; padding:11px 14px; border:1px solid var(--line);
    border-radius:10px; background:transparent; cursor:pointer; color:var(--amber); font:italic 13px ui-serif,Georgia,serif; }
  #loading { position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center;
    font:italic 20px ui-serif,Georgia,serif; color:var(--muted); }
  #err { position:fixed; left:16px; bottom:16px; right:16px; z-index:50; color:#7a1f1f;
    background:var(--paper-solid); padding:12px; border-radius:8px; font:12px ui-monospace,monospace;
    white-space:pre-wrap; display:none; }
  @media (max-width:700px) {
    .brand { left:12px; top:12px; }
    .brand h1 { font-size:20px; }
    .brand p,#status { display:none; }
    #mode-toggle { top:10px; padding:5px 6px 5px 10px; }
    .top-actions { right:10px; top:10px; gap:5px; }
    .top-actions .icon-button { width:34px; height:34px; }
    #undo-button, #redo-button { display:none; }
    #context-hint { top:57px; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tool-rail { bottom:10px; width:calc(100vw - 16px); justify-content:space-around; gap:0; padding:4px; }
    .tool { min-width:0; flex:1; height:48px; }
    .tool .label { font-size:9px; }
    .tool .glyph { font-size:17px; }
  }
  @media (prefers-reduced-motion:reduce) {
    *,*::before,*::after { scroll-behavior:auto !important; transition-duration:.001ms !important; animation-duration:.001ms !important; }
  }
</style>
</head>
<body>
  <div id="loading">whittling sticks…</div>
  <div id="workbench" data-world="build" data-tool="hand" hidden>
    <header class="brand">
      <h1>leanto</h1>
      <p>a table, some sticks, and gravity.</p>
      <div id="status" aria-live="polite"></div>
    </header>
    <button id="mode-toggle" type="button" aria-pressed="false" aria-label="Toggle BUILD and RUN">
      <span id="mode-label">BUILD</span><span class="mode-next">RUN it</span>
    </button>
    <div class="top-actions">
      <button id="undo-button" class="icon-button" type="button" aria-label="Undo" title="Undo">↶</button>
      <button id="redo-button" class="icon-button" type="button" aria-label="Redo" title="Redo">↷</button>
      <button id="sound-toggle" class="icon-button" type="button" aria-label="Turn sound on" aria-pressed="true" title="Sound">♩</button>
      <button id="help-open" class="icon-button" type="button" aria-label="Open controls" aria-expanded="false" title="Controls">?</button>
    </div>
    <p id="context-hint" aria-live="polite">Drag a stick.</p>
    <nav class="tool-rail" aria-label="Workbench tools">
      <button class="tool active" data-tool="hand" type="button" aria-pressed="true"><span class="glyph">✋</span><span class="label">Hand</span></button>
      <button class="tool" id="add-stick" type="button"><span class="glyph">＋</span><span class="label">Stick</span></button>
      <button class="tool" data-tool="glue" type="button" aria-pressed="false"><span class="glyph">●</span><span class="label">Glue</span></button>
      <button class="tool" data-tool="snip" type="button" aria-pressed="false"><span class="glyph">✂</span><span class="label">Snip</span></button>
      <button class="tool" data-tool="stamp" type="button" aria-pressed="false"><span class="glyph">⧉</span><span class="label">Duplicate</span></button>
    </nav>
    <div id="help-panel" hidden role="dialog" aria-modal="true" aria-labelledby="help-title">
      <section class="help-sheet">
        <div class="help-head">
          <h2 id="help-title">Your hands</h2>
          <button id="help-close" class="icon-button" type="button" aria-label="Close controls">×</button>
        </div>
        <p>The stick carries its controls. Select one, then drag what you want to change.</p>
        <ul id="help-list"></ul>
        <button id="load-cottage" class="showcase" type="button" hidden>⌂ Load the Cottage</button>
      </section>
    </div>
  </div>
  <div id="err"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
window.__leanto = { ready:false, sticks:0, frames:0, physSteps:0, error:null, buildMode:true, glueMode:false, joints:0, metrics:null };
import('./src/main.js').then(m => m.boot()).catch(err => {
  window.__leanto.error = String(err && err.stack || err);
  document.getElementById('loading').style.display = 'none';
  const errEl = document.getElementById('err');
  errEl.style.display = 'block';
  errEl.textContent = 'leanto failed to start:\n' + window.__leanto.error;
});
</script>

</body>
</html>
